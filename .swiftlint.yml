included:
  - CommandForJapanese
  - CommandForJapaneseTests

excluded:
  - .build
  - DerivedData
  - Carthage
  - Pods

disabled_rules:
  - trailing_whitespace
  - todo
  - line_length

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - unused_import

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

type_name:
  min_length: 3
  max_length:
    warning: 50

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20
